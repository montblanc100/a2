<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Generator</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: #1e1e1e; padding: 30px; border-radius: 15px; }
        input { width: 80%; padding: 12px; border-radius: 8px; border: none; margin-bottom: 10px; }
        button { padding: 12px 25px; background: #6200ee; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #result { margin-top: 20px; min-height: 200px; }
        img { max-width: 100%; border-radius: 10px; display: none; margin-top: 15px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #6200ee; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; display: none; margin: auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <h1>מחולל תמונות AI</h1>
        <input type="text" id="promptInput" placeholder="כתוב תיאור באנגלית...">
        <br>
        <button id="generateBtn">צור תמונה ✨</button>

        <div id="result">
            <div class="loader" id="loader"></div>
            <img id="outputImage" src="">
        </div>
    </div>

    <script>
        // 1. הזן כאן את ה-Token שלך
        const API_TOKEN = "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
"; 
        
        // 2. כתובת ה-Proxy (חשוב מאוד לעקוף CORS)
        const PROXY = "https://cors-anywhere.herokuapp.com/";
        const MODEL_URL = "https://api-inference.huggingface.co/models/black-forest-labs/FLUX.1-schnell";

        const btn = document.getElementById('generateBtn');
        const promptInput = document.getElementById('promptInput');
        const loader = document.getElementById('loader');
        const img = document.getElementById('outputImage');

        btn.onclick = async function() {
            const prompt = promptInput.value;
            if (!prompt) return alert("בבקשה כתוב תיאור!");

            // עדכון הממשק
            btn.disabled = true;
            btn.innerText = "יוצר...";
            loader.style.display = "block";
            img.style.display = "none";

            try {
                const response = await fetch(PROXY + MODEL_URL, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${API_TOKEN}`,
                        "Content-Type": "application/json",
                        "x-requested-with": "XMLHttpRequest"
                    },
                    body: JSON.stringify({ inputs: prompt })
                });

                if (response.status === 403) {
                    alert("צריך לאשר את ה-Proxy. דף האישור יפתח כעת. לחץ על הכפתור הלבן שם וחזור לכאן.");
                    window.open("https://cors-anywhere.herokuapp.com/corsdemo", "_blank");
                    return;
                }

                const blob = await response.blob();
                img.src = URL.createObjectURL(blob);
                img.style.display = "block";
                btn.innerText = "צור תמונה ✨";

            } catch (err) {
                console.error(err);
                alert("שגיאה: " + err.message);
            } finally {
                btn.disabled = false;
