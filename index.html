<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחולל התמונות שלי</title>
    <style>
        body {
            font-family: sans-serif;
            background: #121212;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        input {
            width: 80%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            margin-bottom: 10px;
            font-size: 16px;
        }

        button {
            padding: 12px 25px;
            background: #6200ee;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

        button:disabled {
            background: #444;
        }

        #result {
            margin-top: 20px;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed #444;
            border-radius: 10px;
        }

        img {
            max-width: 100%;
            border-radius: 10px;
            display: none;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #6200ee;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>AI Image Generator</h1>
        <p>כתוב תיאור לתמונה באנגלית:</p>
        <input type="text" id="promptInput" placeholder="למשל: A magical castle on a floating island...">
        <br>
        <button id="generateBtn">צור תמונה ✨</button>

        <div id="result">
            <div class="loader" id="loader"></div>
            <img id="outputImage" src="" alt="התמונה תופיע כאן">
        </div>
    </div>

    <script>
        // 1. החלף כאן ב-Token האמיתי שלך
        const API_TOKEN = "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";
        const MODEL_URL = "https://api-inference.huggingface.co/models/black-forest-labs/FLUX.1-schnell";

        const btn = document.getElementById('generateBtn');
        const promptInput = document.getElementById('promptInput');
        const loader = document.getElementById('loader');
        const img = document.getElementById('outputImage');

        async function query(data) {
            console.log("שולח בקשה לשרת...");
            const response = await fetch(MODEL_URL, {
                headers: {
                    "Authorization": `Bearer ${API_TOKEN}`,
                    "Content-Type": "application/json"
                },
                method: "POST",
                body: JSON.stringify(data),
            });

            const result = await response.blob();

            // בדיקה אם השרת החזיר שגיאה (במקום תמונה)
            if (response.status !== 200) {
                const errorText = await result.text();
                console.error("שגיאת שרת:", errorText);
                throw new Error("השרת החזיר שגיאה. ודא שה-Token תקין.");
            }

            return result;
        }

        btn.addEventListener('click', async () => {
            const prompt = promptInput.value;
            if (!prompt) return alert("בבקשה תכתוב תיאור באנגלית!");

            // איפוס מצב
            btn.disabled = true;
            btn.innerText = "יוצר... (זה לוקח כ-10 שניות)";
            loader.style.display = "block";
            img.style.display = "none";

            try {
                const responseBlob = await query({ "inputs": prompt });
                const objectURL = URL.createObjectURL(responseBlob);
                img.src = objectURL;
                img.style.display = "block";
                btn.innerText = "צור תמונה ✨";
            } catch (error) {
                alert("שגיאה: " + error.message);
                btn.innerText = "נסה שוב";
            } finally {
                btn.disabled = false;
                loader.style.display = "none";
            }
        });
    </script>
</body>

</html>
